<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notificaciones - The Titan Barbershop</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: #0d0b0e;
        background-image:
          radial-gradient(
            ellipse at top right,
            rgba(90, 50, 140, 0.2) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at top left,
            rgba(160, 110, 20, 0.18) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at bottom right,
            rgba(90, 50, 140, 0.2) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at bottom left,
            rgba(160, 110, 20, 0.18) 0%,
            transparent 55%
          );
        color: #e8d5a0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        padding: 2rem;
      }

      h1 {
        font-family: "Playfair Display", serif;
        font-size: 1.4rem;
        color: #e8d5a0;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
      }

      .btn-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
      }

      .demo-btn {
        padding: 0.6rem 1.2rem;
        border-radius: 6px;
        border: 1px solid rgba(184, 134, 11, 0.3);
        background: #16121c;
        color: #e8d5a0;
        font-family: "Inter", sans-serif;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      .demo-btn:hover {
        background: rgba(184, 134, 11, 0.08);
        border-color: rgba(184, 134, 11, 0.6);
      }
      .demo-btn.success {
        border-color: rgba(184, 134, 11, 0.5);
      }
      .demo-btn.error {
        border-color: rgba(192, 57, 43, 0.5);
        color: #e8a0a0;
      }
      .demo-btn.info {
        border-color: rgba(100, 149, 237, 0.4);
      }
      .demo-btn.warning {
        border-color: rgba(230, 180, 0, 0.5);
        color: #f5e090;
      }
      .demo-btn.modal {
        border-color: rgba(184, 134, 11, 0.4);
        background: linear-gradient(135deg, #7a5c00, #b8860b);
        color: #0d0b0e;
        font-weight: 700;
      }

      /* ── Toast ── */
      .toast-container {
        position: fixed;
        bottom: 28px;
        right: 24px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .app-toast {
        pointer-events: all;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 12px 18px;
        border-radius: 5px;
        font-family: "Inter", sans-serif;
        font-size: 18px;
        min-width: 240px;
        max-width: 360px;
        background: rgba(90, 50, 140, 0.2) 0%;
        border: 1px solid rgba(184, 134, 11, 0.3);
        color: #ffffff;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        opacity: 1;
        transition: opacity 0.18s ease;
        animation: toastIn 0.25s ease;
      }

      @keyframes toastIn {
        from {
          transform: translateY(16px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .app-toast.success {
        border-color: rgba(154, 255, 124, 0.5);
      }
      .app-toast.error {
        border-color: rgba(255, 129, 115, 0.5);
        color: #e8a0a0;
      }
      .app-toast.info {
        border-color: rgba(100, 149, 237, 0.4);
      }
      .app-toast.warning {
        border-color: rgba(230, 180, 0, 0.5);
        color: #f5e090;
      }

      .app-toast .msg {
        flex: 1;
        line-height: 1.5;
      }

      .app-toast .close-btn {
        background: none;
        border: none;
        color: inherit;
        opacity: 0.5;
        font-size: 16px;
        cursor: pointer;
        padding: 0;
        line-height: 1;
        transition: opacity 0.2s;
      }
      .app-toast .close-btn:hover {
        opacity: 1;
      }

      /* ── Modal ── */
      .app-modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        z-index: 9998;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.2s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .app-modal {
        background: #16121c;
        border: 1px solid rgba(184, 134, 11, 0.3);
        border-radius: 6px;
        padding: 32px 28px;
        max-width: 380px;
        width: 90%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        position: relative;
      }

      .app-modal::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, #b8860b, transparent);
        border-radius: 6px 6px 0 0;
      }

      .app-modal h3 {
        font-family: "Playfair Display", serif;
        font-size: 18px;
        color: #e8d5a0;
        margin-bottom: 10px;
      }

      .app-modal p {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        line-height: 1.6;
        margin-bottom: 24px;
      }

      .app-modal .row {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }

      .app-btn {
        padding: 9px 20px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
        font-family: "Inter", sans-serif;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.25s;
        border: 1px solid transparent;
      }

      .app-btn.ghost {
        background: transparent;
        border-color: rgba(255, 255, 255, 0.1);
        color: white;
      }
      .app-btn.ghost:hover {
        border-color: rgba(255, 255, 255, 0.25);
        color: white;
      }

      .app-btn.primary {
        background: linear-gradient(135deg, #7a5c00, #b8860b);
        color: #000000;
        font-weight: 700;
      }
      .app-btn.primary:hover {
        color: #000;
        border-color: rgba(0, 0, 0, 0.6);
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <!-- Notify root -->
    <div id="app-notify-root">
      <div id="app-toast-container" class="toast-container"></div>
      <div id="app-modal-container"></div>
    </div>

    <h1>Vista previa de notificaciones</h1>

    <div class="btn-grid">
      <button
        class="demo-btn success"
        onclick="showToast('Cuenta creada correctamente.', 'success', 3500)"
      >
        <i class="fa-solid fa-check"></i> Success
      </button>
      <button
        class="demo-btn error"
        onclick="showToast('Email o contraseña incorrectos.', 'error', 3500)"
      >
        <i class="fa-solid fa-xmark"></i> Error
      </button>
      <button
        class="demo-btn info"
        onclick="showToast('Sesión iniciada. Redirigiendo...', 'info', 3500)"
      >
        <i class="fa-solid fa-circle-info"></i> Info
      </button>
      <button
        class="demo-btn warning"
        onclick="
          showToast(
            'La contraseña debe tener al menos 8 caracteres.',
            'warning',
            3500,
          )
        "
      >
        <i class="fa-solid fa-triangle-exclamation"></i> Warning
      </button>
      <button class="demo-btn modal" onclick="demoConfirm()">
        <i class="fa-solid fa-shield-halved"></i> Modal Confirmar
      </button>
    </div>

    <script>
      (function notifyHelpers() {
        const toastContainer = document.getElementById("app-toast-container");
        const modalContainer = document.getElementById("app-modal-container");

        window.showToast = function (text = "", type = "info", timeout = 3500) {
          return new Promise((resolve) => {
            const wrap = document.createElement("div");
            wrap.className = `app-toast ${type}`;
            wrap.innerHTML = `<div class="msg">${text}</div><button class="close-btn" aria-label="close">×</button>`;
            const closeBtn = wrap.querySelector(".close-btn");
            let removed = false;
            const cleanup = () => {
              if (removed) return;
              removed = true;
              wrap.style.opacity = "0";
              setTimeout(() => {
                try {
                  toastContainer.removeChild(wrap);
                } catch (e) {}
                resolve();
              }, 180);
            };
            closeBtn.addEventListener("click", cleanup);
            toastContainer.appendChild(wrap);
            setTimeout(cleanup, timeout || 3500);
          });
        };

        window.showConfirm = function (title = "Confirmar", message = "") {
          return new Promise((resolve) => {
            const backdrop = document.createElement("div");
            backdrop.className = "app-modal-backdrop";
            backdrop.innerHTML = `
            <div class="app-modal" role="dialog" aria-modal="true">
              <h3>${title}</h3>
              <p>${message}</p>
              <div class="row">
                <button class="app-btn ghost" id="app-cancel-btn">Cancelar</button>
                <button class="app-btn primary" id="app-ok-btn">Aceptar</button>
              </div>
            </div>`;
            modalContainer.appendChild(backdrop);
            const cleanup = (value) => {
              try {
                modalContainer.removeChild(backdrop);
              } catch (e) {}
              resolve(Boolean(value));
            };
            backdrop
              .querySelector("#app-cancel-btn")
              .addEventListener("click", () => cleanup(false));
            backdrop
              .querySelector("#app-ok-btn")
              .addEventListener("click", () => cleanup(true));
            backdrop.addEventListener("click", (ev) => {
              if (ev.target === backdrop) cleanup(false);
            });
          });
        };
      })();

      async function demoConfirm() {
        const result = await showConfirm(
          "Eliminar cita",
          "¿Estás seguro de que deseas cancelar esta cita? Esta acción no se puede deshacer.",
        );
        if (result) {
          await showToast("Cita cancelada correctamente.", "success", 3000);
        } else {
          await showToast("Acción cancelada.", "info", 2500);
        }
      }
    </script>
  </body>
</html>
