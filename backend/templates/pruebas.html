<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Titan Barbershop — Login</title>
    <link rel="stylesheet" href="../static/prueba.css" />
  </head>
  <body>
    <div class="card">
      <!-- Logo -->
      <div class="logo-area">
        <div class="logo-placeholder">
          <img
            class="img"
            src="/images/titanicon.jpeg"
            alt="The Titan Barbershop"
          />
        </div>
        <div class="brand-name">The Titan</div>
        <div class="brand-tagline">Barbershop</div>
      </div>

      <div class="section-divider"><span>Acceso</span></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <div class="input-wrapper">
            <i class="icon fa-solid fa-envelope"></i>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="tu@correo.com"
              required
            />
          </div>
          <div class="field-error" id="emailError">
            Ingresa un correo válido
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <i class="icon fa-solid fa-lock"></i>
            <input
              type="password"
              name="password"
              id="password"
              placeholder="••••••••"
              required
            />
            <button
              type="button"
              class="toggle-pass"
              id="togglePass"
              tabindex="-1"
            >
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </button>
          </div>
          <div class="field-error" id="passError">Mínimo 6 caracteres</div>
        </div>

        <div class="forgot"><a href="#">¿Olvidaste tu contraseña?</a></div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-text">Ingresar</span>
          <span class="btn-spinner"><span class="spinner-ring"></span></span>
        </button>

        <div class="register-sep"><span>¿Nuevo aquí?</span></div>

        <div class="create-account">
          <p>Crea tu cuenta y gestiona tus citas</p>
          <button
            type="button"
            class="create-button"
            onclick="window.location.href = '/newaccount'"
          >
            <i class="fa-solid fa-user-plus"></i> Crear cuenta nueva
          </button>
        </div>
      </form>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
      <span id="toastIcon"></span>
      <span id="toastMsg"></span>
    </div>

    <script>
      const API_BASE_URL =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1"
          ? "http://localhost:4000"
          : window.location.origin;

      // Toggle password visibility
      document.getElementById("togglePass").addEventListener("click", () => {
        const input = document.getElementById("password");
        const icon = document.getElementById("eyeIcon");
        if (input.type === "password") {
          input.type = "text";
          icon.className = "fa-solid fa-eye-slash";
        } else {
          input.type = "password";
          icon.className = "fa-solid fa-eye";
        }
      });

      // Toast helper
      function showToast(msg, type = "success") {
        const toast = document.getElementById("toast");
        document.getElementById("toastMsg").textContent = msg;
        document.getElementById("toastIcon").innerHTML =
          type === "success"
            ? '<i class="fa-solid fa-check" style="color:#b8860b"></i>'
            : '<i class="fa-solid fa-xmark" style="color:#c0392b"></i>';
        toast.className = `toast ${type} show`;
        setTimeout(() => toast.classList.remove("show"), 3500);
      }

      // Clear field errors on input
      ["email", "password"].forEach((id) => {
        document.getElementById(id).addEventListener("input", () => {
          document
            .getElementById(id === "email" ? "emailError" : "passError")
            .classList.remove("show");
        });
      });

      document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("login-form");

        form.addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = document.getElementById("email").value.trim();
          const contraseña = document.getElementById("password").value.trim();

          let valid = true;
          if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            document.getElementById("emailError").classList.add("show");
            valid = false;
          }
          if (!contraseña || contraseña.length < 6) {
            document.getElementById("passError").classList.add("show");
            valid = false;
          }
          if (!valid) return;

          const btn = document.getElementById("loginBtn");
          btn.classList.add("loading");
          btn.disabled = true;

          try {
            const resp = await fetch(`${API_BASE_URL}/api/auth/login`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, contraseña }),
            });

            let data;
            try {
              data = await resp.json();
            } catch (parseError) {
              showToast(
                "El servidor no devolvió una respuesta válida",
                "error",
              );
              return;
            }

            if (!resp.ok) {
              showToast(
                data.error || `Error al iniciar sesión (${resp.status})`,
                "error",
              );
              return;
            }

            if (!data.token || !data.usuario) {
              showToast("Respuesta del servidor incompleta", "error");
              return;
            }

            localStorage.setItem("token", data.token);
            localStorage.setItem("rol", data.usuario.rol);
            localStorage.setItem("usuario", JSON.stringify(data.usuario));

            showToast("Bienvenido ✓", "success");
            setTimeout(() => redirigirSegunRol(data.usuario.rol), 1000);
          } catch (err) {
            showToast("Error de conexión. Intenta más tarde.", "error");
          } finally {
            btn.classList.remove("loading");
            btn.disabled = false;
          }
        });
      });

      function redirigirSegunRol(rol) {
        switch (rol) {
          case "barbero":
          case "admin":
            window.location.href = "/homebarber";
            break;
          case "cliente":
          default:
            window.location.href = "/home";
            break;
        }
      }
    </script>
  </body>
</html>
