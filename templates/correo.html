<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
  </head>
  <body
    style="
      background: #0d0b0e;
      font-family: Inter, sans-serif;
      padding: 2rem;
      color: #e8d5a0;
    "
  >
    <div
      style="
        max-width: 480px;
        margin: 0 auto;
        background: #16121c;
        border: 1px solid rgba(184, 134, 11, 0.25);
        border-radius: 14px;
        padding: 2rem;
        text-align: center;
      "
    >
      <h1 style="color: #e8d5a0; font-size: 1.4rem">The Titan Barbershop</h1>
      <p style="color: rgba(232, 213, 160, 0.6); margin: 1rem 0">
        Hola <strong>{{nombre}}</strong>, confirma tu cuenta haciendo clic en el
        botón:
      </p>
      <a
        href="{{CONFIRM_URL}}"
        style="
          display: inline-block;
          margin: 1rem 0;
          padding: 0.85rem 2rem;
          background: linear-gradient(135deg, #b8860b, #d4a017);
          color: #0d0b0e;
          font-weight: 700;
          border-radius: 8px;
          text-decoration: none;
          font-size: 1rem;
        "
      >
        ✅ Confirmar mi cuenta
      </a>
      <p
        style="
          color: rgba(232, 213, 160, 0.4);
          font-size: 0.8rem;
          margin-top: 1.5rem;
        "
      >
        Si no creaste esta cuenta, ignora este correo.
      </p>
    </div>
  </body>
</html>
